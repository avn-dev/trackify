<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <title>Trackify — Image Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0b0b0c; font-family: 'Geist', system-ui, sans-serif; }
    * { box-sizing: border-box; }
    #export {
      width: 2400px; background: #0b0b0c; color: #f6f6f7;
      padding: 80px 80px 100px;
    }
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 56px; border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 80px;
    }
    .brand {
      display: flex; align-items: center; gap: 28px;
    }
    .mark { width: 88px; height: 88px; border-radius: 22px; background: #f6f6f7; display: flex; align-items: center; justify-content: center; }
    .mark svg { width: 52px; height: 52px; }
    .brand h1 {
      margin: 0; font-size: 96px; font-weight: 600; letter-spacing: -3.5px; line-height: 0.95;
    }
    .brand h1 + p {
      margin: 8px 0 0; font-size: 22px; color: #b8b8bd; letter-spacing: -0.3px;
    }
    .meta {
      display: flex; gap: 48px; align-items: flex-end;
    }
    .meta div .lbl {
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: #76767c; letter-spacing: 1.4px; text-transform: uppercase;
    }
    .meta div .val {
      font-family: 'Geist Mono', monospace; font-size: 30px;
      color: #f6f6f7; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.8px;
    }

    .section { margin-bottom: 56px; }
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      padding-bottom: 24px;
    }
    .section-num {
      font-family: 'Geist Mono', monospace; font-size: 14px;
      color: #c8ff3d; letter-spacing: 4px;
    }
    .section-title {
      font-size: 42px; font-weight: 600; letter-spacing: -1.2px; margin: 8px 0 0;
    }
    .section-sub {
      font-family: 'Geist Mono', monospace; font-size: 13px;
      color: #76767c; letter-spacing: 1px; text-transform: uppercase;
    }

    .row {
      display: flex; gap: 36px; align-items: flex-start;
    }
    .phone-wrap {
      width: 402px; flex-shrink: 0;
    }
    .phone-label {
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: #76767c; letter-spacing: 1px; text-transform: uppercase;
      padding: 0 4px 12px;
    }

    .footer {
      margin-top: 80px; padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: #76767c; letter-spacing: 1.6px; text-transform: uppercase;
    }

    /* Floating download bar (chrome only — excluded from the rendered image) */
    .dl-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #161618; border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px; padding: 10px 12px 10px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 9999; font-family: 'Geist', system-ui;
    }
    .dl-bar .lbl {
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: #76767c; letter-spacing: 1px; text-transform: uppercase;
    }
    .dl-bar .val {
      font-family: 'Geist Mono', monospace; font-size: 13px;
      color: #f6f6f7; font-variant-numeric: tabular-nums;
    }
    .dl-bar button {
      background: #c8ff3d; color: #0b0b0c; border: none;
      border-radius: 10px; padding: 10px 18px;
      font-family: 'Geist', system-ui; font-size: 13px; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    }
    .dl-bar button:disabled { background: #1c1c1f; color: #76767c; cursor: wait; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="export">
    <div class="top">
      <div class="brand">
        <div class="mark">
          <svg viewBox="0 0 100 100">
            <path d="M22 62 L40 44 L52 56 L78 30" stroke="#c8ff3d" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="78" cy="30" r="5" fill="#c8ff3d"/>
          </svg>
        </div>
        <div>
          <h1>Trackify.</h1>
          <p>App-Design · iOS · Mai 2026</p>
        </div>
      </div>
      <div class="meta">
        <div><div class="lbl">Screens</div><div class="val">19</div></div>
        <div><div class="lbl">Sektionen</div><div class="val">7</div></div>
        <div><div class="lbl">Version</div><div class="val">1.0</div></div>
      </div>
    </div>

    <div id="sections-root"></div>

    <div class="footer">
      <span>Trackify · Refined Sport-Tech · Geist + Lime</span>
      <span>© 2026</span>
    </div>
  </div>

  <div class="dl-bar" id="dl-bar">
    <span class="lbl">PNG-Export</span>
    <span class="val" id="dl-status">Wird vorbereitet…</span>
    <button id="dl-btn" disabled>Download</button>
  </div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-training.jsx"></script>
  <script type="text/babel" src="screens-cardio.jsx"></script>
  <script type="text/babel" src="screens-body.jsx"></script>
  <script type="text/babel" src="screens-lab.jsx"></script>
  <script type="text/babel" src="screens-supplements.jsx"></script>
  <script type="text/babel" src="screens-profile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const sections = [
      { id: '01', name: 'Auth', sub: 'Onboarding · Login · Register',
        screens: [
          ['Splash', SplashScreen], ['Onboarding', OnboardingScreen],
          ['Login', LoginScreen], ['Registrieren', RegisterScreen],
        ]},
      { id: '02', name: 'Home', sub: 'Tages-Dashboard',
        screens: [['Dashboard', HomeScreen]]},
      { id: '03', name: 'Training', sub: 'Plan · Übung · Live',
        screens: [
          ['Trainingsplan', TrainingPlanScreen],
          ['Übung · Detail', ExerciseDetailScreen],
          ['Aktives Workout', ActiveWorkoutScreen],
        ]},
      { id: '04', name: 'Cardio', sub: 'Live-Lauf · Historie',
        screens: [
          ['Lauf · Live', RunLiveScreen],
          ['Lauf · Historie', RunHistoryScreen],
        ]},
      { id: '05', name: 'Körper', sub: 'Gewicht · Körperfett · Maße',
        screens: [
          ['Gewicht', WeightScreen],
          ['Körperfett', BodyFatScreen],
          ['Körpermaße', MeasurementsScreen],
        ]},
      { id: '06', name: 'Labor & Blutwerte', sub: 'Marker · Trend · Eintragen',
        screens: [
          ['Übersicht', LabOverviewScreen],
          ['Marker · Detail', LabMarkerDetailScreen],
          ['Neue Messung', LabAddScreen],
        ]},
      { id: '07', name: 'Supplements & Meds', sub: 'Tagesplan · Detail · Neu',
        screens: [
          ['Tagesplan', SupplementOverviewScreen],
          ['Detail · Vitamin D3', SupplementDetailScreen],
          ['Neu hinzufügen', SupplementAddScreen],
        ]},
      { id: '08', name: 'Insights & Profil', sub: 'Statistik · Settings',
        screens: [
          ['Insights', InsightsScreen],
          ['Profil · Settings', ProfileScreen],
        ]},
    ];

    function Section({ s, i, total }) {
      // chunk into rows of 4
      const rows = [];
      for (let k = 0; k < s.screens.length; k += 4) rows.push(s.screens.slice(k, k + 4));
      return (
        <div className="section">
          <div className="section-head">
            <div>
              <span className="section-num">{s.id} / {String(total).padStart(2,'0')}</span>
              <h2 className="section-title">{s.name}</h2>
            </div>
            <span className="section-sub">{s.sub}</span>
          </div>
          {rows.map((row, ri) => (
            <div key={ri} className="row" style={{ marginTop: ri ? 32 : 0 }}>
              {row.map(([label, Comp]) => (
                <div key={label} className="phone-wrap">
                  <div className="phone-label">{label}</div>
                  <ThemeCtx.Provider value={themes.dark}>
                    <IOSDevice dark={true}>
                      <Comp/>
                    </IOSDevice>
                  </ThemeCtx.Provider>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('sections-root')).render(
      <>{sections.map((s, i) => <Section key={s.id} s={s} i={i} total={sections.length}/>)}</>
    );

    window.__ready = false;
    (async () => {
      try { await document.fonts.ready; } catch {}
      // Let React + IOSDevice frames settle
      await new Promise(r => setTimeout(r, 1800));
      window.__ready = true;

      // Auto-render PNG of the export div
      const statusEl = document.getElementById('dl-status');
      const btnEl = document.getElementById('dl-btn');
      const target = document.getElementById('export');
      const dlBar = document.getElementById('dl-bar');

      try {
        statusEl.textContent = 'Rendere…';
        // Hide the bar while we capture so it doesn't end up in the image
        dlBar.style.display = 'none';
        const w = target.offsetWidth, h = target.offsetHeight;
        statusEl.textContent = `${w} × ${h}px`;
        const blob = await htmlToImage.toBlob(target, {
          width: w, height: h,
          pixelRatio: 1.5,
          cacheBust: true,
          backgroundColor: '#0b0b0c',
        });
        const url = URL.createObjectURL(blob);
        dlBar.style.display = '';
        statusEl.textContent = `${w} × ${h}px · ${(blob.size / 1024 / 1024).toFixed(1)} MB`;
        btnEl.disabled = false;
        btnEl.textContent = 'PNG herunterladen ↓';
        btnEl.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = 'Trackify-overview.png';
          a.click();
        };
        // Auto-download once on first ready
        setTimeout(() => btnEl.click(), 500);
      } catch (e) {
        console.error(e);
        dlBar.style.display = '';
        statusEl.textContent = 'Fehler: ' + e.message;
      }
    })();
  </script>
</body>
</html>
