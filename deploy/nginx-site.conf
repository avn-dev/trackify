# /etc/nginx/sites-available/trackify-api
# Symlink: ln -s /etc/nginx/sites-available/trackify-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.trackify.vision2co.de;

    # Certbot will auto-add the SSL block below this one.
    # After: certbot --nginx -d api.trackify.vision2co.de

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
