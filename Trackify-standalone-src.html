<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Trackify — App Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Geist', system-ui, sans-serif; }
    * { box-sizing: border-box; }
    .ab { /* iOS frame container fills artboard exactly */
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: #f0eee9;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0b0b0c">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="20" width="160" height="160" rx="44" fill="#f6f6f7"/>
      <path d="M48 124 L84 88 L108 112 L160 60" stroke="#c8ff3d" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="160" cy="60" r="9" fill="#c8ff3d"/>
    </svg>
  </template>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-training.jsx"></script>
  <script type="text/babel" src="screens-cardio.jsx"></script>
  <script type="text/babel" src="screens-body.jsx"></script>
  <script type="text/babel" src="screens-profile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "#c8ff3d"
    }/*EDITMODE-END*/;

    function App() {
      const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
      // Build live theme from tweaks (theme picks base, accent overrides)
      const base = themes[tw.theme] || themes.dark;
      const liveTheme = React.useMemo(() => ({
        ...base,
        accent: tw.accent || base.accent,
        accentText: pickReadable(tw.accent || base.accent),
      }), [base, tw.accent]);

      const wrap = (node) => (
        <ThemeCtx.Provider value={liveTheme}>{node}</ThemeCtx.Provider>
      );

      return (
        <>
          <DesignCanvas>
            <DCSection id="auth" title="Onboarding & Auth" subtitle="First-run, Login, Register">
              <DCArtboard id="splash" label="Splash" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<SplashScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="onboarding" label="Onboarding · 02/03" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<OnboardingScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="login" label="Login" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<LoginScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="register" label="Registrieren" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<RegisterScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>

            <DCSection id="home" title="Home" subtitle="Tägliche Übersicht">
              <DCArtboard id="dashboard" label="Dashboard" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<HomeScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>

            <DCSection id="training" title="Training" subtitle="Plan · Übung · Live-Workout">
              <DCArtboard id="plan" label="Trainingsplan" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<TrainingPlanScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="exercise" label="Übung · Detail" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<ExerciseDetailScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="active" label="Aktives Workout" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<ActiveWorkoutScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>

            <DCSection id="cardio" title="Cardio" subtitle="Live-Tracking & Historie">
              <DCArtboard id="run-live" label="Lauf · Live" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<RunLiveScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="run-history" label="Lauf · Historie" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<RunHistoryScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>

            <DCSection id="body" title="Körper" subtitle="Gewicht, Körperfett, Maße">
              <DCArtboard id="weight" label="Gewicht" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<WeightScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="bf" label="Körperfett" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<BodyFatScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="measure" label="Körpermaße" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<MeasurementsScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>

            <DCSection id="me" title="Insights & Profil" subtitle="Statistik · Settings">
              <DCArtboard id="insights" label="Insights" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<InsightsScreen/>)}</IOSDevice>
              </DCArtboard>
              <DCArtboard id="profile" label="Profil · Settings" width={402} height={874}>
                <IOSDevice dark={liveTheme.name === 'dark'}>{wrap(<ProfileScreen/>)}</IOSDevice>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme">
              <TweakRadio
                label="Erscheinungsbild"
                value={tw.theme}
                onChange={(v) => setTweak('theme', v)}
                options={[
                  { value: 'dark', label: 'Dark' },
                  { value: 'light', label: 'Light' },
                ]}
              />
            </TweakSection>
            <TweakSection label="Akzentfarbe">
              <TweakColor
                label="Akzent"
                value={tw.accent}
                onChange={(v) => setTweak('accent', v)}
                options={['#c8ff3d', '#ff5a2c', '#4f7cff', '#7ee0a8']}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    // pick foreground that reads on the accent (light bg → dark text, dark bg → white)
    function pickReadable(hex) {
      if (!hex) return '#0b0b0c';
      const h = hex.replace('#', '');
      const r = parseInt(h.substr(0,2), 16), g = parseInt(h.substr(2,2), 16), b = parseInt(h.substr(4,2), 16);
      const lum = 0.299*r + 0.587*g + 0.114*b;
      return lum > 150 ? '#0b0b0c' : '#ffffff';
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
