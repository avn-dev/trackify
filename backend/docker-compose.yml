services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - sqlite_data:/var/www/html/database
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sqlite_data:
