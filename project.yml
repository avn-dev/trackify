name: TrackifyApp
options:
  bundleIdPrefix: app.trackify
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

targets:
  TrackifyApp:
    type: application
    platform: iOS
    sources:
      - path: TrackifyApp
        excludes:
          - "**/.DS_Store"
    info:
      path: TrackifyApp/Info.plist
      properties:
        CFBundleDisplayName: Trackify
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Trackify braucht deinen Standort, um Läufe live aufzuzeichnen."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Damit Läufe auch mit ausgeschlossenem Display getrackt werden können, braucht Trackify dauerhaften Standortzugriff."
        NSHealthShareUsageDescription: "Trackify kann dein Gewicht und Herzrate aus der Health App importieren."
        NSHealthUpdateUsageDescription: "Trackify kann abgeschlossene Workouts in die Health App exportieren."
        NSCameraUsageDescription: "Für den Scan von Lab-Befunden."
        UIBackgroundModes:
          - location
        UIAppFonts:
          - Geist-Regular.otf
          - Geist-Medium.otf
          - Geist-SemiBold.otf
          - Geist-Bold.otf
          - GeistMono-Regular.otf
          - GeistMono-Medium.otf
          - GeistMono-SemiBold.otf
    entitlements:
      path: TrackifyApp/TrackifyApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.trackify.ios
        INFOPLIST_FILE: TrackifyApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrackifyApp/TrackifyApp.entitlements
    scheme:
      testTargets:
        - TrackifyAppTests

  TrackifyAppTests:
    type: bundle.unit-test
    platform: iOS
    sources: TrackifyAppTests
    dependencies:
      - target: TrackifyApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.trackify.ios.tests
