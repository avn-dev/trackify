# /etc/nginx/sites-available/trackify-api
# Cert: Cloudflare Origin Certificate at /etc/ssl/trackify/origin.crt + origin.key

server {
    listen 80;
    server_name trackify-api.vision2co.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trackify-api.vision2co.de;

    ssl_certificate     /etc/ssl/trackify/origin.crt;
    ssl_certificate_key /etc/ssl/trackify/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
